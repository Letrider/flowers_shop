version: '3.8'

services:
  backend:
    build: ./server
    container_name: flowers-shop-api
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - JWT_SECRET=${JWT_SECRET:-replace_with_secure_secret_minimum_32_chars}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - UPLOAD_DIR=uploads
    volumes:
      - ./server/data.json:/app/data.json
      - ./server/uploads:/app/uploads
    restart: unless-stopped
    networks:
      - flowers-network

  frontend:
    build: .
    container_name: flowers-shop-web
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:4000
    restart: unless-stopped
    networks:
      - flowers-network

networks:
  flowers-network:
    driver: bridge
